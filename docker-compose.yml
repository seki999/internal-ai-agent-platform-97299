services:
  # Reactのproduction buildを配信し、利用者browserからBackend APIへ接続する。
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3001/api
    ports:
      - "5173:5173"
    depends_on:
      # APIがhealthcheckを通過してからFrontendを起動し、初回表示の接続失敗を避ける。
      backend:
        condition: service_healthy

  # Express API。Dockerでは実PostgreSQLとHTTP版CosmosDB mockを選択する。
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: 3001
      FRONTEND_ORIGIN: http://localhost:5173
      POSTGRES_REPOSITORY_MODE: postgres
      DATABASE_URL: postgresql://platform:platform@postgres:5432/ai_platform
      COSMOS_REPOSITORY_MODE: http
      COSMOS_MOCK_URL: http://cosmosdb-mock:8090
      AZURE_AI_PROVIDER: mock
    ports:
      - "3001:3001"
    depends_on:
      # port openだけでなく各serviceのhealthを待ち、初期化前queryを防止する。
      postgres:
        condition: service_healthy
      cosmosdb-mock:
        condition: service_healthy
    healthcheck:
      # 公開health APIを使い、実際にExpressがrequestを処理できることを確認する。
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 5s
      timeout: 3s
      retries: 12

  # Agent定義・実行履歴・業務taskを保持する構造化データストア。
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: ai_platform
    ports:
      - "5432:5432"
    volumes:
      # schemaを先、seedを後に適用するためファイル名へ実行順序を付ける。
      - postgres-data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d ai_platform"]
      interval: 5s
      timeout: 3s
      retries: 12

  # Azure CosmosDBを利用できないローカル環境向けのJSON document service。
  cosmosdb-mock:
    image: node:20-alpine
    working_dir: /app
    command: ["node", "server.mjs"]
    ports:
      - "8090:8090"
    volumes:
      # database.local.jsonをhost側へ保持し、container再作成後も会話を確認できるようにする。
      - ./cosmosdb-mock:/app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  # `docker compose down`では保持し、`down -v`のときだけ初期化されるDB volume。
  postgres-data:
